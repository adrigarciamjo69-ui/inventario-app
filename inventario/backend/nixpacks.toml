# Nixpacks - configuracion de build del backend en Dokploy.
# Anade el binario 'nmap' (necesario para el descubrimiento de red, Fase 2)
# manteniendo la autodeteccion de Node de Nixpacks.
#
# Alternativa equivalente sin este fichero: definir la variable de entorno
#   NIXPACKS_APT_PKGS=nmap
# en la configuracion del servicio de Dokploy.

[phases.setup]
aptPkgs = ["nmap"]
