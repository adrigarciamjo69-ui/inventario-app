server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Permite subir binarios del agente (~6-8 MB) y otros uploads grandes.
    # Sin esto, nginx corta la conexion antes de pasar la peticion al backend
    # y el navegador muestra "Network Error".
    client_max_body_size 80m;
    client_body_timeout   120s;

    location /api {
        proxy_pass http://inventarioapp-backend-cxtzpj:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts amplios para uploads y descargas del agente.
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_request_buffering off;
    }

    location /uploads {
        proxy_pass http://inventarioapp-backend-cxtzpj:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
